name: PR Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: false
